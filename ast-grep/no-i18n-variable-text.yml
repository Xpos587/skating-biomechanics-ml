id: no-i18n-variable-text
language: tsx
message: |
  Don't hardcode user-facing text in variable assignments. Use translations.

  Instead of:  const label = "Прогресс"
  Use:         const label = t("nav.progress")
severity: warning
note: |
  Allowed: technical strings (URLs, CSS, regex), format strings.
rule:
  kind: variable_declarator
  has:
    kind: string_fragment
    regex: '[\u0410-\u044F\u0451]{2,}'
    stopBy: end
