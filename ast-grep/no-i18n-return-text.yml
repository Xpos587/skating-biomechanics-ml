id: no-i18n-return-text
language: tsx
message: |
  Don't hardcode user-facing text in return statements. Use useTranslations() or getTranslations().

  Instead of:  return "Прыжок"
  Use:         return t("track.jumps")
severity: warning
note: |
  Allowed: technical strings (URLs, CSS, regex), empty strings.
rule:
  kind: return_statement
  has:
    kind: string_fragment
    regex: '[\u0410-\u044F\u0451]{2,}'
    stopBy: end
