name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: uv sync --frozen --dev
      - run: uv run ruff format --check backend/ ml/
      - run: uv run ruff check backend/ ml/ --output-format=github

  typecheck:
    name: Type Check (basedpyright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: uv sync --frozen
      - run: uv run basedpyright --level error backend/app

  gitleaks:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: uv sync --frozen --dev
      - run: PYTHONPATH=ml:. uv run pytest backend/tests/ ml/tests/ -v -m "not slow" --tb=short

  fe-lint:
    name: Lint (Biome)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile
      - name: Check
        working-directory: frontend
        run: bunx biome check .

  fe-typecheck:
    name: Type Check (tsc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile
      - name: Type check
        working-directory: frontend
        run: bun run typecheck

  fe-build:
    name: Build (Next.js)
    runs-on: ubuntu-latest
    needs: [fe-lint, fe-typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile
      - name: Build
        working-directory: frontend
        run: bun run build

  ci-passed:
    name: CI Passed
    runs-on: ubuntu-latest
    needs: [lint, typecheck, gitleaks, test, fe-lint, fe-typecheck, fe-build]
    if: always()
    steps:
      - name: Check results
        env:
          LINT: ${{ needs.lint.result }}
          TYPECHECK: ${{ needs.typecheck.result }}
          GITLEAKS: ${{ needs.gitleaks.result }}
          TEST: ${{ needs.test.result }}
          FE_LINT: ${{ needs.fe-lint.result }}
          FE_TYPECHECK: ${{ needs.fe-typecheck.result }}
          FE_BUILD: ${{ needs.fe-build.result }}
        run: |
          FAILED=0
          for job in LINT TYPECHECK GITLEAKS TEST FE_LINT FE_TYPECHECK FE_BUILD; do
            RESULT="${!job}"
            if [[ "$RESULT" != "success" ]]; then
              echo "::error::${job} failed (${RESULT})"
              FAILED=1
            fi
          done
          if [[ "$FAILED" -eq 1 ]]; then
            echo "::error::CI failed"
            exit 1
          fi
          echo "✅ All CI checks passed!"
