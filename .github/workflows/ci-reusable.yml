name: CI (Reusable)

on:
  workflow_call:
    inputs:
      python-version:
        required: false
        default: "3.11"
        type: string
    outputs:
      ci-passed:
        description: "Whether all CI checks passed"
        value: ${{ jobs.ci-passed.outputs.result }}

jobs:
  lint:
    name: Lint (ruff)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}
      - name: Sync deps
        run: uv sync --frozen --dev
      - name: Ruff format
        run: uv run ruff format --check backend/ ml/
      - name: Ruff check
        run: uv run ruff check backend/ ml/ --output-format=github

  typecheck:
    name: Type Check (basedpyright)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}
      - name: Sync deps
        run: uv sync --frozen --dev
      - name: basedpyright
        run: uv run basedpyright --level error backend/app

  gitleaks:
    name: Secret Scan (gitleaks)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          curl -sL "https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz" | tar xz
          chmod +x gitleaks
      - name: Run gitleaks
        run: ./gitleaks detect --source . --verbose --redact

  ast-grep:
    name: Lint (ast-grep)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
      - uses: ast-grep/action@v1.5.0
        with:
          config: sgconfig.yml
          paths: "backend/ ml/ frontend/"

  test:
    name: Tests
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [lint]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}
      - name: Sync deps
        run: uv sync --frozen --dev
      - name: pytest
        run: PYTHONPATH=ml:. uv run pytest backend/tests/ ml/tests/ -v -m "not slow and not integration" --cov=backend/app --cov=ml/src --cov-report=xml --junitxml=junit.xml --tb=short
      - name: Upload coverage (backend)
        if: always()
        uses: codecov/codecov-action@v6
        with:
          files: coverage.xml
          flags: backend,ml
          name: python-coverage
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload test results (backend)
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: junit.xml

  fe-lint:
    name: Lint (Biome)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Install deps
        working-directory: frontend
        run: bun install --frozen-lockfile
      - name: Biome check
        working-directory: frontend
        run: bunx biome check .

  fe-typecheck:
    name: Type Check (tsc)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Install deps
        working-directory: frontend
        run: bun install --frozen-lockfile
      - name: tsc
        working-directory: frontend
        run: bun run typecheck

  fe-build:
    name: Build (Next.js)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [fe-lint, fe-typecheck]
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Install deps
        working-directory: frontend
        run: bun install --frozen-lockfile
      - name: next build
        working-directory: frontend
        run: ANALYZE=true bun run build 2>&1 | tee build.log
      - name: Bundle sizes summary
        if: always()
        working-directory: frontend
        run: |
          echo "### Bundle Sizes" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          grep -E '├|└|│' build.log >> "$GITHUB_STEP_SUMMARY" || echo "No bundle tree output" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
      - name: Upload bundle analyzer
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bundle-analyzer
          path: frontend/.next/analyze/
          retention-days: 14

  fe-test:
    name: Tests (Vitest)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [fe-lint]
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Install deps
        working-directory: frontend
        run: bun install --frozen-lockfile
      - name: Vitest coverage
        working-directory: frontend
        run: bun run vitest run --coverage --reporter=junit --outputFile=test-report.junit.xml
      - name: Upload coverage (frontend)
        if: always()
        uses: codecov/codecov-action@v6
        with:
          directory: frontend/coverage
          flags: frontend
          name: frontend-coverage
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload test results (frontend)
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: frontend/test-report.junit.xml

  docker-backend:
    name: Docker Build (Backend)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v6
      - name: Setup Blacksmith Builder
        uses: useblacksmith/setup-docker-builder@v1
      - name: Build backend image
        uses: useblacksmith/build-push-action@v2
        with:
          context: .
          file: backend/Containerfile
          push: false
          tags: skating-backend:ci

  docker-frontend:
    name: Docker Build (Frontend)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [fe-lint, fe-typecheck, fe-build]
    steps:
      - uses: actions/checkout@v6
      - name: Setup Blacksmith Builder
        uses: useblacksmith/setup-docker-builder@v1
      - name: Build frontend image
        uses: useblacksmith/build-push-action@v2
        with:
          context: frontend
          file: frontend/Containerfile
          push: false
          tags: skating-frontend:ci

  ci-passed:
    name: CI Summary
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [lint, typecheck, gitleaks, ast-grep, test, fe-lint, fe-typecheck, fe-build, fe-test, docker-backend, docker-frontend]
    if: always()
    outputs:
      result: ${{ steps.check.outputs.result }}
    steps:
      - name: Check results & write summary
        id: check
        env:
          LINT: ${{ needs.lint.result }}
          TYPECHECK: ${{ needs.typecheck.result }}
          GITLEAKS: ${{ needs.gitleaks.result }}
          TEST: ${{ needs.test.result }}
          FE_LINT: ${{ needs.fe-lint.result }}
          FE_TYPECHECK: ${{ needs.fe-typecheck.result }}
          FE_BUILD: ${{ needs.fe-build.result }}
          FE_TEST: ${{ needs.fe-test.result }}
          DOCKER_BACKEND: ${{ needs.docker-backend.result }}
          DOCKER_FRONTEND: ${{ needs.docker-frontend.result }}
          AST_GREP: ${{ needs.ast-grep.result }}
        run: |
          FAILED=0

          echo "| Job | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|--------|" >> "$GITHUB_STEP_SUMMARY"

          check_job() {
            local name="$1" result="$2"
            if [[ "$result" == "success" ]]; then
              echo "| :white_check_mark: ${name} | \`${result}\` |" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "| :x: ${name} | \`${result}\` |" >> "$GITHUB_STEP_SUMMARY"
              FAILED=1
            fi
          }

          check_job "Lint (ruff)" "$LINT"
          check_job "Type Check (basedpyright)" "$TYPECHECK"
          check_job "Secret Scan (gitleaks)" "$GITLEAKS"
          check_job "Tests" "$TEST"
          check_job "Lint (Biome)" "$FE_LINT"
          check_job "Type Check (tsc)" "$FE_TYPECHECK"
          check_job "Build (Next.js)" "$FE_BUILD"
          check_job "Tests (Vitest)" "$FE_TEST"
          check_job "Docker Build (Backend)" "$DOCKER_BACKEND"
          check_job "Docker Build (Frontend)" "$DOCKER_FRONTEND"
          echo "| :mag: ast-grep | \`${AST_GREP}\` (informational) |" >> "$GITHUB_STEP_SUMMARY"

          if [[ "$FAILED" -eq 1 ]]; then
            echo "::error::CI failed"
            echo "result=failure" >> "$GITHUB_OUTPUT"
            echo "### :x: CI Failed" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          echo "result=success" >> "$GITHUB_OUTPUT"
          echo "### :white_check_mark: All CI checks passed" >> "$GITHUB_STEP_SUMMARY"
