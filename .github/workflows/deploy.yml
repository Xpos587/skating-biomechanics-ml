name: Deploy

on:
  push:
    branches: [master]
    paths-ignore:
      - "ml/gpu_server/**"
      - ".github/workflows/container.yml"
      - "docs/**"
      - "research/**"
      - "experiments/**"
      - "*.md"
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  ci:
    uses: ./.github/workflows/ci-reusable.yml
    with:
      python-version: "3.11"

  build-frontend:
    name: Build Frontend Image
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build & push Frontend
        id: build
        uses: docker/build-push-action@v7
        with:
          context: frontend
          file: frontend/Containerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/skating-frontend:latest
            ghcr.io/${{ github.repository_owner }}/skating-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Frontend build summary
        if: always()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Frontend Build

          | Metric | Value |
          |--------|-------|
          | Status | \`${{ steps.build.outcome }}\` |
          | Image | \`ghcr.io/${{ github.repository_owner }}/skating-frontend:${{ github.sha }}\` |

          EOF

  build-backend:
    name: Build Backend Image
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build & push Backend
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: backend/Containerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/skating-backend:latest
            ghcr.io/${{ github.repository_owner }}/skating-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Backend build summary
        if: always()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Backend Build

          | Metric | Value |
          |--------|-------|
          | Status | \`${{ steps.build.outcome }}\` |
          | Image | \`ghcr.io/${{ github.repository_owner }}/skating-backend:${{ github.sha }}\` |

          EOF

  deploy:
    name: Deploy to VPS
    needs: [build-frontend, build-backend]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6

      - name: Sync compose & Caddyfile to VPS
        id: sync
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "infra/compose.prod.yaml,infra/Caddyfile"
          target: "/opt/skating-app/"
          strip_components: 1

      - name: Pull images
        id: pull
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 3m
          script: |
            cd /opt/skating-app
            export TAG=${{ github.sha }}
            export GHCR_OWNER=${{ github.repository_owner }}
            docker compose --env-file .env.prod -f compose.prod.yaml pull frontend backend

      - name: Rolling restart
        id: restart
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 2m
          script: |
            cd /opt/skating-app
            export TAG=${{ github.sha }}
            export GHCR_OWNER=${{ github.repository_owner }}
            docker compose --env-file .env.prod -f compose.prod.yaml \
              up -d --no-deps --force-recreate frontend backend

      - name: Health check
        id: health
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 3m
          script: |
            cd /opt/skating-app
            timeout 120 bash -c '
              until docker compose --env-file .env.prod -f compose.prod.yaml ps --format json 2>/dev/null | \
                python3 -c "
            import sys, json
            ok = True
            for line in sys.stdin:
              svc = json.loads(line)
              name = svc.get(\"Service\", \"\")
              health = svc.get(\"Health\", \"\")
              if name in (\"frontend\", \"backend\") and health != \"healthy\":
                print(f\"  {name}: {health}\")
                ok = False
            if ok:
              print(\"All services healthy\")
            sys.exit(0 if ok else 1)
            "; do
                sleep 10
              done
            '

      - name: Cleanup
        id: cleanup
        if: always()
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 1m
          script: |
            cd /opt/skating-app
            docker image prune -f --filter "until=24h" > /dev/null 2>&1

      - name: Deploy summary
        if: always()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Deploy

          | Step | Status |
          |------|--------|
          | Sync files | \`${{ steps.sync.outcome }}\` |
          | Pull images | \`${{ steps.pull.outcome }}\` |
          | Rolling restart | \`${{ steps.restart.outcome }}\` |
          | Health check | \`${{ steps.health.outcome }}\` |
          | Cleanup | \`${{ steps.cleanup.outcome }}\` |

          EOF

  deploy-summary:
    name: Pipeline Summary
    needs: [ci, build-frontend, build-backend, deploy]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Write summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Pipeline Overview

          | Stage | Status |
          |-------|--------|
          | CI | \`${{ needs.ci.result }}\` |
          | Build Frontend | \`${{ needs.build-frontend.result }}\` |
          | Build Backend | \`${{ needs.build-backend.result }}\` |
          | Deploy | \`${{ needs.deploy.result }}\` |

          **Commit:** \`${{ github.sha }}\`
          **Triggered by:** @${{ github.actor }}
          **Branch:** \`${{ github.ref_name }}\`

          EOF

          if [[ "${{ needs.deploy.result }}" != "success" ]]; then
            echo "::error::Deploy pipeline failed"
            exit 1
          fi
