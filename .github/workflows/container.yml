name: Container

on:
  push:
    branches: [master]
    paths:
      - ml/gpu_server/Containerfile
      - .containerignore
      - ml/**
      - Taskfile.yml
      - .github/workflows/container.yml
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-push:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download models from R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: ${{ secrets.CF_R2_ENDPOINT_URL }}
          AWS_REGION: auto
        run: |
          aws s3 sync "s3://${{ secrets.CF_R2_BUCKET }}/models/" data/models/ \
            --exclude "*.pth.tr" --exclude "*.pt" --exclude ".cache/*"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ml/gpu_server/Containerfile
          push: true
          tags: |
            ghcr.io/xpos587/skating-ml-gpu:latest
            ghcr.io/xpos587/skating-ml-gpu:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
