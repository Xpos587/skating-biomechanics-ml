name: Container

on:
  push:
    branches: [master]
    paths:
      - vastai/Containerfile
      - .containerignore
      - src/**
      - Taskfile.yml
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/skating-ml-gpu

jobs:
  build-push:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v5.0.0
        with:
          fetch-depth: 1

      - name: Download models from R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: ${{ secrets.CF_R2_ENDPOINT_URL }}
          AWS_REGION: auto
        run: |
          aws s3 sync "s3://${{ secrets.CF_R2_BUCKET }}/models/" data/models/ \
            --exclude "*.pth.tr" --exclude "*.pt" --exclude ".cache/*"

      - name: Login to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.1

      - name: Build and push
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d1f7184f9ea # v6.18.0
        with:
          context: .
          file: vastai/Containerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
