name: Container (GPU Worker)

on:
  push:
    branches: [master]
    paths:
      - ml/gpu_server/Containerfile
      - .containerignore
      - ml/**
      - Taskfile.yml
      - .github/workflows/container.yml
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-push:
    name: Build & Push GPU Worker
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Download models from R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: ${{ secrets.CF_R2_ENDPOINT_URL }}
          AWS_REGION: auto
        run: |
          aws s3 sync "s3://${{ secrets.CF_R2_BUCKET }}/models/" data/models/ \
            --exclude "*.pth.tr" --exclude "*.pt" --exclude ".cache/*"

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Blacksmith Builder
        uses: useblacksmith/setup-docker-builder@v1

      - name: Build and push
        id: build
        uses: useblacksmith/build-push-action@v2
        with:
          context: .
          file: ml/gpu_server/Containerfile
          push: true
          tags: |
            ghcr.io/xpos587/skating-ml-gpu:latest
            ghcr.io/xpos587/skating-ml-gpu:${{ github.sha }}

      - name: Build summary
        if: always()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## GPU Worker Build

          | Metric | Value |
          |--------|-------|
          | Status | \`${{ steps.build.outcome }}\` |
          | Image | \`ghcr.io/xpos587/skating-ml-gpu:${{ github.sha }}\` |

          EOF
