name: Lint Actions

on:
  pull_request:
    paths: [".github/workflows/*"]
  push:
    branches: [master]
    paths: [".github/workflows/*"]

jobs:
  actionlint:
    name: actionlint
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6

      - name: Run actionlint
        uses: reviewdog/action-actionlint@v1
        with:
          reporter: github-check
