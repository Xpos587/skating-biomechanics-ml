name: Lint Actions

on:
  pull_request:
    paths: [".github/workflows/*"]
  push:
    branches: [master]
    paths: [".github/workflows/*"]

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run actionlint
        uses: reviewdog/action-actionlint@v1
        with:
          reporter: github-check
