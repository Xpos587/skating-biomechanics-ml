# $schema: https://taskfile.dev/schema.json
version: '3'

vars:
  UV_RUN: uv run
  BUNX: bunx

tasks:
  # Python tasks
  py-lint:
    desc: Run ruff check and format on Python code
    dir: .
    cmd: "{{.UV_RUN}} ruff check backend/ ml/ --fix && {{.UV_RUN}} ruff format backend/ ml/"

  py-test:
    desc: Run pytest tests (excluding slow tests)
    dir: .
    cmd: "{{.UV_RUN}} pytest backend/tests/ ml/tests/ -v -m \"not slow\" --tb=short"

  py-typecheck:
    desc: Run basedpyright type checker on backend/app and ml/src
    dir: .
    cmd: "{{.UV_RUN}} basedpyright --level error backend/app ml/src"

  py-all:
    desc: Run all Python quality checks (lint, test, typecheck)
    dir: .
    cmds:
      - task: py-lint
      - task: py-test
      - task: py-typecheck

  # Database tasks
  db-migrate:
    desc: Run database migrations (Alembic upgrade)
    cmd: "{{.UV_RUN}} alembic upgrade head"

  db-rollback:
    desc: Rollback last database migration
    cmd: "{{.UV_RUN}} alembic downgrade -1"

  db-reset:
    desc: Reset database (drop all, recreate, migrate)
    cmds:
      - "{{.UV_RUN}} alembic downgrade base"
      - "{{.UV_RUN}} alembic upgrade head"

  db-migration:
    desc: Create a new autogenerate migration
    cmd: "{{.UV_RUN}} alembic revision --autogenerate -m '{{.migration_name}}'"

  # Frontend tasks
  fe-lint:
    desc: Run Biome check and format on frontend code
    dir: frontend
    cmd: "{{.BUNX}} biome check --write ."

  fe-test:
    desc: Run vitest tests
    dir: frontend
    cmd: "bun test --run"

  fe-typecheck:
    desc: Run TypeScript type checker
    dir: frontend
    cmd: "{{.BUNX}} tsc -p tsconfig.app.json"

  fe-build:
    desc: Build frontend for production
    dir: frontend
    cmd: "bun run build"

  fe-all:
    desc: Run all frontend quality checks and build
    dir: .
    cmds:
      - task: fe-lint
      - task: fe-test
      - task: fe-typecheck
      - task: fe-build

  # Ast-grep tasks
  sg-test:
    desc: Run ast-grep rule tests
    cmd: ast-grep test

  sg-scan:
    desc: Run ast-grep scan on all source files
    cmd: ast-grep scan

  # Unified tasks
  ci:
    desc: Run all CI checks (Python + Frontend)
    dir: .
    cmds:
      - task: sg-test
      - task: py-all
      - task: fe-all

  dev:
    desc: Start backend and frontend dev servers in parallel
    dir: .
    cmds:
      - task: dev-backend
      - task: dev-frontend
    parallel: true

  dev-backend:
    desc: Start Python backend dev server
    dir: .
    cmd: "{{.UV_RUN}} uvicorn backend.app.main:app --reload --port 8000"

  dev-frontend:
    desc: Start frontend dev server
    dir: frontend
    cmd: "bun run dev"

  # Default task
  default:
    desc: Run all CI checks
    cmd: task ci

  # Vast.ai Serverless tasks
  vastai-build:
    desc: Build GPU worker image for Vast.ai Serverless
    cmd: podman build -f ml/gpu_server/Containerfile -t ghcr.io/xpos587/skating-ml-gpu:latest .

  vastai-push:
    desc: Push GPU worker image to ghcr.io
    cmd: podman push ghcr.io/xpos587/skating-ml-gpu:latest

  vastai-deploy:
    desc: Build and push GPU worker image
    cmds:
      - task: vastai-build
      - task: vastai-push
